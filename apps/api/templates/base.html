<!DOCTYPE html>
<html lang="en" class="bg-gray-900 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Laptop AI Box{% endtitle %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- HLS.js for viewing video feeds -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="bg-gray-800 p-4 shadow-md flex items-center justify-between">
        <div class="text-xl font-bold flex items-center gap-2">
            <i class="fas fa-box-open text-blue-500"></i>
            <a href="/">Laptop AI Box 
               <span class="text-xs text-gray-400 font-normal ml-2">Hikvision-First MVP</span>
            </a>
        </div>
        <div class="flex gap-4">
            <a href="/" class="hover:text-blue-400"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/nvr" class="hover:text-blue-400"><i class="fas fa-network-wired"></i> NVR Setup</a>
            <a href="/cameras" class="hover:text-blue-400"><i class="fas fa-video"></i> Cameras</a>
            <a href="/ai" class="hover:text-blue-400"><i class="fas fa-brain"></i> AI Ops</a>
            <a href="/events-page" class="hover:text-blue-400"><i class="fas fa-bell"></i> Events</a>
            <a href="/integrations/webhooks" class="hover:text-blue-400"><i class="fas fa-link"></i> Webhooks</a>
            <a href="/settings" class="hover:text-blue-400"><i class="fas fa-cog"></i> Settings</a>
        </div>
    </nav>
    <main class="flex-grow p-6">
        {% block content %}{% endblock %}
    </main>
    <footer class="bg-gray-800 text-center p-4 text-sm text-gray-500">
        &copy; 2026 AI Box Edge System.
    </footer>
</body>
</html>
