{% extends "base.html" %}
{% block title %}Camera Details | Laptop AI Box{% endblock %}
{% block content %}
<div class="mb-4">
    <a href="/cameras" class="text-gray-400 hover:text-white"><i class="fas fa-arrow-left"></i> Back to Cameras</a>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Player -->
    <div class="lg:col-span-2 bg-gray-800 rounded-lg shadow-xl overflow-hidden border border-gray-700">
        <div class="relative w-full aspect-video bg-black flex items-center justify-center">
            <video id="hls-player" controls class="w-full h-full hidden"></video>
            <div id="player-loading" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500">
                <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
                <p>Initializing HLS Stream...</p>
                <p class="text-xs text-gray-600 mt-2">This may take a few seconds.</p>
            </div>
            <div id="player-error"
                class="absolute inset-0 flex flex-col items-center justify-center text-red-500 hidden bg-black">
                <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                <p>Stream unavailable.</p>
            </div>
        </div>
        <div class="p-4 border-t border-gray-700 flex justify-between items-center">
            <h2 id="cam-name" class="text-xl font-bold">Loading...</h2>
            <div id="cam-status" class="px-3 py-1 bg-gray-700 text-xs rounded-full uppercase tracking-wide">WAIT</div>
        </div>
    </div>

    <!-- Settings Sidebar -->
    <div class="bg-gray-800 rounded-lg shadow-xl p-6 border border-gray-700">
        <h3 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2">Configuration</h3>

        <form id="cam-settings-form" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400">Name</label>
                <input type="text" id="input-name"
                    class="mt-1 w-full bg-gray-700 border border-gray-600 rounded p-2 focus:ring-blue-500"
                    value="Loading...">
            </div>

            <div class="flex items-center justify-between">
                <label class="text-sm text-gray-400 font-medium">Camera Enabled</label>
                <input type="checkbox" id="input-enabled"
                    class="toggle-checkbox h-6 w-11 cursor-pointer appearance-none rounded-full bg-gray-600 checked:bg-blue-600 transition duration-200">
            </div>

            <div class="flex items-center justify-between">
                <label class="text-sm text-gray-400 font-medium">AI Analysis Enabled</label>
                <input type="checkbox" id="input-ai"
                    class="toggle-checkbox h-6 w-11 cursor-pointer appearance-none rounded-full bg-gray-600 checked:bg-purple-600 transition duration-200">
            </div>

            <div>
                <label class="block text-sm text-gray-400">AI Processing FPS Limit</label>
                <div class="flex items-center gap-2 mt-1">
                    <input type="range" id="input-fps" min="1" max="30" class="w-full">
                    <span id="fps-val"
                        class="text-sm font-mono w-8 text-right bg-gray-900 border border-gray-700 px-1 rounded">5</span>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded shadow transition mt-6">
                Save Changes
            </button>
        </form>
    </div>
</div>

<script>
    const camId = "{{ camera_id }}";

    // UI binding
    const fpsInput = document.getElementById('input-fps');
    const fpsVal = document.getElementById('fps-val');
    fpsInput.addEventListener('input', e => {
        fpsVal.innerText = e.target.value;
    });

    async function loadDetails() {
        const res = await fetch(`/api/cameras/${camId}`);
        const cam = await res.json();

        document.getElementById('cam-name').innerText = cam.name;
        document.getElementById('cam-status').innerText = cam.status;
        if (cam.status === 'online') {
            document.getElementById('cam-status').classList.add('bg-green-600', 'text-white');
            document.getElementById('cam-status').classList.remove('bg-gray-700');
        } else if (cam.status === 'error') {
            document.getElementById('cam-status').classList.add('bg-red-600', 'text-white');
            document.getElementById('cam-status').classList.remove('bg-gray-700');
        }

        document.getElementById('input-name').value = cam.name;
        document.getElementById('input-enabled').checked = cam.enabled;
        document.getElementById('input-ai').checked = cam.ai_enabled;
        document.getElementById('input-fps').value = cam.fps_limit;
        fpsVal.innerText = cam.fps_limit;

        // Trigger HLS conversion
        try {
            const hlsRes = await fetch(`/api/cameras/${camId}/trigger-hls`, { method: 'POST' });
            const data = await hlsRes.json();
            initHls(data.hls_url);
        } catch (e) {
            showPlayerError();
        }
    }

    function initHls(url) {
        const video = document.getElementById('hls-player');
        const loading = document.getElementById('player-loading');

        // Wait 3 seconds for ffmpeg to create index.m3u8
        setTimeout(() => {
            if (Hls.isSupported()) {
                const hls = new Hls({
                    maxBufferLength: 5,
                    maxMaxBufferLength: 10,
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    loading.classList.add('hidden');
                    video.classList.remove('hidden');
                    video.play().catch(() => console.log('Autoplay prevented'));
                });
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                // try to recover network error
                                console.log("fatal network error encountered, try to recover");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log("fatal media error encountered, try to recover");
                                hls.recoverMediaError();
                                break;
                            default:
                                // cannot recover
                                hls.destroy();
                                showPlayerError();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function () {
                    loading.classList.add('hidden');
                    video.classList.remove('hidden');
                    video.play();
                });
            } else {
                showPlayerError();
            }
        }, 3000); // Artificial delay to ensure first segment is created
    }

    function showPlayerError() {
        document.getElementById('player-loading').classList.add('hidden');
        document.getElementById('hls-player').classList.add('hidden');
        document.getElementById('player-error').classList.remove('hidden');
    }

    document.getElementById('cam-settings-form').addEventListener('submit', async e => {
        e.preventDefault();
        const data = {
            name: document.getElementById('input-name').value,
            enabled: document.getElementById('input-enabled').checked,
            ai_enabled: document.getElementById('input-ai').checked,
            fps_limit: parseInt(document.getElementById('input-fps').value)
        };

        const btn = e.target.querySelector('button');
        const oldText = btn.innerText;
        btn.innerText = 'Saving...';
        btn.classList.add('opacity-50', 'cursor-not-allowed');

        await fetch(`/api/cameras/${camId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        btn.innerText = 'Saved!';
        btn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-blue-600');
        btn.classList.add('bg-green-600');
        setTimeout(() => {
            btn.innerText = oldText;
            btn.classList.add('bg-blue-600');
            btn.classList.remove('bg-green-600');
        }, 2000);
    });

    loadDetails();
</script>
<style>
    /* Simple CSS to mimic tailwind forms plugin for toggles */
    .toggle-checkbox:checked {
        right: 0;
        border-color: #3B82F6;
    }

    .toggle-checkbox {
        position: relative;
        border: 2px solid theme('colors.gray.500');
    }

    .toggle-checkbox::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 2px;
        transform: translateY(-50%);
        width: 1.25rem;
        height: 1.25rem;
        background-color: white;
        border-radius: 50%;
        transition: left 0.2s;
    }

    .toggle-checkbox:checked::after {
        left: calc(100% - 1.25rem - 2px);
    }
</style>
{% endblock %}
