{% extends "base.html" %}
{% block title %}Settings | Laptop AI Box{% endblock %}
{% block content %}
<h1 class="text-3xl font-bold mb-6">Global Settings</h1>
<div class="bg-gray-800 rounded-lg p-6 shadow-xl border border-gray-700 max-w-2xl">
    <p class="text-gray-400 mb-6">Configure global parameters for the AI Box.</p>

    <form class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-300">Data Retention (Days)</label>
            <input type="number" value="7"
                class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded p-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-300">Minimum Confidence Threshold (%)</label>
            <input type="number" value="65"
                class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded p-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-300">Fight Detection Sensitivity</label>
            <select class="mt-1 block w-full bg-gray-700 border border-gray-600 rounded p-2 focus:ring-blue-500">
                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
            </select>
        </div>

        <button type="button"
            class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded shadow transition"
            onclick="alert('Settings saved (mocked)')">Save Settings</button>
    </form>
</div>
{% endblock %}
