services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: laptop_ai_box_api
    restart: unless-stopped
    ports:
      - "4000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/sqlite/laptop_ai_box.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-mzxG9QZ0N9E5_n-I54aWXZ5G8X-G9oN-w-X_gZJpL14=}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
    volumes:
      - ./data:/app/data
      - ./apps:/app/apps
      - ./libs:/app/libs
      - ./scripts:/app/scripts
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    container_name: laptop_ai_box_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///data/sqlite/laptop_ai_box.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-mzxG9QZ0N9E5_n-I54aWXZ5G8X-G9oN-w-X_gZJpL14=}
    volumes:
      - ./data:/app/data
      - ./apps:/app/apps
      - ./libs:/app/libs
      - ./scripts:/app/scripts
